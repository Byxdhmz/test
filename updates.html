<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>更新日志</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .update-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .update-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .update-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .update-item:active {
            transform: scale(0.99);
        }

        .update-item:first-child {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(49, 130, 206, 0.05) 100%);
        }

        .update-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .update-version {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.1rem;
        }

        .update-badge {
            background: var(--accent);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .update-date {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .update-content ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .update-content li {
            padding: 6px 0;
            padding-left: 20px;
            position: relative;
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.6;
            border-bottom: 1px solid var(--border);
        }

        .update-content li:last-child {
            border-bottom: none;
        }

        .update-content li::before {
            content: '•';
            position: absolute;
            left: 8px;
            color: var(--accent);
            font-weight: bold;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        .highlight {
            color: #e53e3e;
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .update-page {
                padding: 40px 24px;
            }
            
            .page-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <!-- 主内容 -->
    <main class="main-content" id="mainContent" style="padding-top: 24px;">
        <div class="update-page">
            <div class="page-header">
                <h1 class="page-title">📌 更新内容</h1>
                <p class="page-subtitle">查看所有版本更新记录</p>
            </div>

            <div class="update-list">
                <div class="update-item" data-date="2026-03-21">
                    <div class="update-header">
                        <span class="update-version">v2.0.0</span>
                        <span class="update-badge">最新</span>
                    </div>
                    <div class="update-date">2026年3月21日</div>
                    <div class="update-content">
                        <ul>
                            <li>更新了主界面图像</li>
                            <li>修复了一些bug</li>
                        </ul>
                    </div>
                </div>

                <div class="update-item" data-date="2026-02-19">
                    <div class="update-header">
                        <span class="update-version">v2.0.0 预览版</span>
                    </div>
                    <div class="update-date">2026年2月19日</div>
                    <div class="update-content">
                        <ul>
                            <li>又是一月一次的更新</li>
                            <li>极大的减少本地内存占用的同时修复一些bug</li>
                            <li><span class="highlight">另：</span>增加了开启隐藏功能的按钮</li>
                        </ul>
                    </div>
                </div>

                <div class="update-item" data-date="2026-01-25">
                    <div class="update-header">
                        <span class="update-version">v1.0.1</span>
                    </div>
                    <div class="update-date">2026年1月25日</div>
                    <div class="update-content">
                        <ul>
                            <li>一月一次的更新</li>
                            <li>更新了少许功能以及修复一些bug</li>
                            <li>增加了一些隐藏功能</li>
                        </ul>
                    </div>
                </div>

                <div class="update-item" data-date="2025-12-17">
                    <div class="update-header">
                        <span class="update-version">v1.0.0</span>
                    </div>
                    <div class="update-date">2025年12月17日</div>
                    <div class="update-content">
                        <ul>
                            <li>初始版本发布</li>
                            <li>包含欢迎界面、时间显示、书籍选择功能</li>
                            <li>新增更新内容和常用网站入口</li>
                        </ul>
                    </div>
                </div>
            </div>

            <a href="index.html" class="back-btn">← 返回首页</a>
        </div>
    </main>

    <script src="version.js"></script>
    <script src="common.js"></script>
</body>
</html>
