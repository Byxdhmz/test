<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到阅读世界</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #d4a574;
            --primary-gold-light: #e8c39e;
            --dark-bg: #1a1a2e;
            --darker-bg: #16213e;
            --text-light: #f5f5f0;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Noto Serif SC', 'Georgia', serif;
            background: var(--dark-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            color: var(--text-light);
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(212, 165, 116, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 149, 237, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(212, 165, 116, 0.08) 0%, transparent 50%),
                linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float-particle 20s infinite linear;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 900px;
            width: 90%;
            position: relative;
        }

        /* 装饰边框 */
        .ornament {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid var(--primary-gold);
            opacity: 0.3;
        }

        .ornament.top-left {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }

        .ornament.top-right {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
        }

        .ornament.bottom-left {
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
        }

        .ornament.bottom-right {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
        }

        /* 欢迎区域 */
        .welcome-section {
            margin-bottom: 50px;
            animation: fadeInUp 1.2s ease-out;
        }

        .book-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: gentle-bounce 3s ease-in-out infinite;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .welcome-message {
            font-size: 3.2rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--text-light) 0%, var(--primary-gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
        }

        .sub-welcome {
            font-size: 1.3rem;
            color: var(--text-muted);
            letter-spacing: 0.3em;
            font-weight: 300;
            position: relative;
            display: inline-block;
        }

        .sub-welcome::before,
        .sub-welcome::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-gold);
            opacity: 0.6;
            font-size: 0.8rem;
        }

        .sub-welcome::before {
            left: -30px;
        }

        .sub-welcome::after {
            right: -30px;
        }

        /* 时间区域 */
        .time-section {
            margin-bottom: 60px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 165, 116, 0.1);
            animation: fadeInUp 1.2s ease-out 0.3s both;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .time-display {
            font-size: 4.5rem;
            font-weight: 200;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.1em;
            color: var(--primary-gold-light);
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(212, 165, 116, 0.3);
        }

        .date-display {
            font-size: 1.2rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* 分隔线 */
        .divider {
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-gold), transparent);
            margin: 0 auto 40px;
            opacity: 0.5;
        }

        /* 进入按钮 */
        .reading-entry {
            animation: fadeInUp 1.2s ease-out 0.6s both;
        }

        .entry-button {
            display: inline-block;
            padding: 20px 60px;
            font-size: 1.2rem;
            background: transparent;
            border: 2px solid var(--primary-gold);
            color: var(--primary-gold-light);
            text-decoration: none;
            border-radius: 50px;
            letter-spacing: 0.2em;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 
                0 0 20px rgba(212, 165, 116, 0.1),
                inset 0 0 20px rgba(212, 165, 116, 0.05);
        }

        .entry-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 165, 116, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .entry-button:hover {
            background: rgba(212, 165, 116, 0.1);
            border-color: var(--primary-gold-light);
            color: var(--text-light);
            transform: translateY(-3px);
            box-shadow: 
                0 10px 30px rgba(212, 165, 116, 0.2),
                inset 0 0 30px rgba(212, 165, 116, 0.1);
        }

        .entry-button:hover::before {
            left: 100%;
        }

        .entry-button::after {
            content: '→';
            margin-left: 10px;
            opacity: 0;
            transform: translateX(-10px);
            display: inline-block;
            transition: all 0.3s ease;
        }

        .entry-button:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        /* 额外链接 */
        .extra-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 40px;
            animation: fadeInUp 1.2s ease-out 0.9s both;
        }

        .extra-links a {
            color: var(--text-muted);
            font-size: 0.95rem;
            text-decoration: none;
            letter-spacing: 0.1em;
            position: relative;
            padding: 5px 0;
            transition: color 0.3s ease;
        }

        .extra-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--primary-gold);
            transition: width 0.3s ease;
        }

        .extra-links a:hover {
            color: var(--primary-gold-light);
        }

        .extra-links a:hover::after {
            width: 100%;
        }



        /* 动画定义 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .welcome-message {
                font-size: 2.2rem;
                letter-spacing: 0.1em;
            }

            .sub-welcome {
                font-size: 1rem;
                letter-spacing: 0.2em;
            }

            .sub-welcome::before,
            .sub-welcome::after {
                display: none;
            }

            .time-display {
                font-size: 2.8rem;
            }

            .date-display {
                font-size: 1rem;
            }

            .entry-button {
                padding: 16px 40px;
                font-size: 1rem;
            }

            .extra-links {
                flex-direction: column;
                gap: 20px;
            }

            .ornament {
                width: 40px;
                height: 40px;
            }
        }

        /* 页面加载动画 */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-book {
            font-size: 4rem;
            animation: book-flip 2s ease-in-out infinite;
        }

        @keyframes book-flip {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(20deg); }
        }

        .loader-text {
            margin-top: 20px;
            color: var(--primary-gold);
            letter-spacing: 0.3em;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- 页面加载动画 -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-content">
            <div class="loader-book">📖</div>
            <div class="loader-text">加载中......</div>
        </div>
    </div>

    <!-- 动态背景 -->
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <!-- 装饰边框 -->
    <div class="ornament top-left"></div>
    <div class="ornament top-right"></div>
    <div class="ornament bottom-left"></div>
    <div class="ornament bottom-right"></div>

    <div class="container">
        <div class="welcome-section">
            <div class="book-icon">📚</div>
            <h1 class="welcome-message">欢迎光临</h1>
            <p class="sub-welcome">随便看看吧</p>
        </div>

        <div class="time-section">
            <div class="time-display" id="timeDisplay">00:00:00</div>
            <div class="date-display" id="dateDisplay">2024年1月1日 星期一</div>
        </div>

        <div class="divider"></div>

        <div class="reading-entry">
            <a href="book-selection.html" class="entry-button" id="enterButton">
                进入
            </a>
        </div>

        <div class="extra-links">
            <a href="updates.html">更新内容</a>
            <a href="links.html">常用网站</a>
        </div>
    </div>

    <div class="version" id="versionDisplay">v1.0.0</div>

    <script>
        // 生成背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 200;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            
            const timeString = now.toLocaleTimeString('zh-CN', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            
            const dateString = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            
            document.getElementById('timeDisplay').textContent = timeString;
            document.getElementById('dateDisplay').textContent = dateString;
        }

        // 获取版本号（如果存在version.js）
        function loadVersion() {
            if (typeof version !== 'undefined') {
                document.getElementById('versionDisplay').textContent = version;
            }
        }

        // 初始化
        function init() {
            createParticles();
            updateTime();
            loadVersion();
            
            setInterval(updateTime, 1000);
            
            // 隐藏加载动画
            setTimeout(() => {
                document.getElementById('pageLoader').classList.add('hidden');
            }, 1500);
        }

        window.addEventListener('load', init);
    </script>
    
    <!-- 预留version.js接口 -->
    <script src="version.js" onerror="console.log('version.js not found, using default version')"></script>
</body>
</html>
