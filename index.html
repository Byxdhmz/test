<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>不用想滴网页</title>
    <link rel="stylesheet" href="common.plus.css">
    <style>
        .main-content {
            margin-top: 56px;
            min-height: calc(100vh - 56px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            position: relative;
            z-index: 1;
        }

        .entry-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 600px;
            animation: fadeInUp 0.5s ease;
        }

        .entry-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
        }

        .entry-card:active { transform: scale(0.98); }
        .entry-card:hover { box-shadow: var(--shadow-lg); border-color: var(--accent); }

        .entry-main {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .entry-icon { 
            font-size: 2.2rem; 
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(49, 130, 206, 0.1);
            border-radius: 12px;
        }

        .entry-info { flex: 1; }
        .entry-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
        .entry-desc { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.5; }

        .entry-arrow { 
            color: var(--text-secondary); 
            font-size: 1.2rem; 
            transition: all 0.2s;
            margin-left: 12px;
        }

        .entry-card:hover .entry-arrow { color: var(--accent); transform: translateX(4px); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 768px) {
            .main-content { margin-top: 64px; min-height: calc(100vh - 64px); padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <!-- 主内容 - 确保在 HTML 中直接存在 -->
    <main class="main-content" id="mainContent">
        <div class="entry-list">
            <a href="book-selection.html" class="entry-card">
                <div class="entry-main">
                    <span class="entry-icon">📖</span>
                    <div class="entry-info">
                        <h2 class="entry-title">阅读中心</h2>
                        <p class="entry-desc">点击进入书库，开始您的阅读之旅</p>
                    </div>
                </div>
                <span class="entry-arrow">→</span>
            </a>

            <a href="links.html" class="entry-card">
                <div class="entry-main">
                    <span class="entry-icon">🌐</span>
                    <div class="entry-info">
                        <h2 class="entry-title">常用网站</h2>
                        <p class="entry-desc">快速访问常用阅读相关网站</p>
                    </div>
                </div>
                <span class="entry-arrow">→</span>
            </a>
        </div>
    </main>

    <!-- 脚本放在最后 -->
    <script src="version.js"></script>
    <script src="common.plus.js"></script>
</body>
</html>
