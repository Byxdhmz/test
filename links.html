<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>常用网站</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .links-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .link-item:active {
            transform: scale(0.99);
        }

        .link-item:hover {
            border-color: var(--accent);
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .link-icon {
            width: 40px;
            height: 40px;
            background: rgba(49, 130, 206, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .link-text {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .link-arrow {
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .link-item:hover .link-arrow {
            color: var(--accent);
            transform: translateX(4px);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 24px;
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .links-page {
                padding: 40px 24px;
            }
            
            .page-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <!-- 主内容 -->
    <main class="main-content" id="mainContent" style="padding-top: 16px;">
        <div class="links-page">
            <div class="page-header">
                <h1 class="page-title">🌐 常用网站</h1>
                <p class="page-subtitle">快速访问常用网站</p>
            </div>

            <div class="links-list">
                <a href="https://ys.mihoyo.com" target="_blank" class="link-item">
                    <div class="link-info">
                        <div class="link-icon">🎮</div>
                        <span class="link-text">原神官网</span>
                    </div>
                    <span class="link-arrow">→</span>
                </a>

                <a href="https://ys.mihoyo.com/cloud" target="_blank" class="link-item">
                    <div class="link-info">
                        <div class="link-icon">☁️</div>
                        <span class="link-text">云原神</span>
                    </div>
                    <span class="link-arrow">→</span>
                </a>

                <a href="http://sr.mihoyo.com" target="_blank" class="link-item">
                    <div class="link-info">
                        <div class="link-icon">🚂</div>
                        <span class="link-text">崩铁官网</span>
                    </div>
                    <span class="link-arrow">→</span>
                </a>

                <a href="https://sr.mihoyo.com/cloud" target="_blank" class="link-item">
                    <div class="link-info">
                        <div class="link-icon">☁️</div>
                        <span class="link-text">云崩铁</span>
                    </div>
                    <span class="link-arrow">→</span>
                </a>

                <a href="https://bilibili.com" target="_blank" class="link-item">
                    <div class="link-info">
                        <div class="link-icon">📺</div>
                        <span class="link-text">bilibili</span>
                    </div>
                    <span class="link-arrow">→</span>
                </a>

                <a href="https://web.sanguosha.com/login/x/index" target="_blank" class="link-item">
                    <div class="link-info">
                        <div class="link-icon">🎴</div>
                        <span class="link-text">三国杀网页版</span>
                    </div>
                    <span class="link-arrow">→</span>
                </a>

                <a href="book-selection-another.html" class="link-item">
                    <div class="link-info">
                        <div class="link-icon">✨</div>
                        <span class="link-text">其他隐藏功能</span>
                    </div>
                    <span class="link-arrow">→</span>
                </a>
            </div>

            <a href="index.html" class="back-btn">← 返回首页</a>
        </div>
    </main>

    <script src="version.js"></script>
    <script src="common.js"></script>
</body>
</html>
