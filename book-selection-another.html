<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>隐藏小功能</title>
    <link rel="stylesheet" href="common.plus.css">
    <style>
        .hidden-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .hidden-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (min-width: 768px) {
            .hidden-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        .hidden-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px 16px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .hidden-card:active {
            transform: scale(0.98);
        }

        .hidden-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--shadow-lg);
        }

        .hidden-icon {
            width: 60px;
            height: 60px;
            background: rgba(49, 130, 206, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .hidden-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .hidden-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 32px;
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .hidden-page {
                padding: 40px 24px;
            }
            
            .page-title {
                font-size: 2rem;
            }
            
            .hidden-card {
                padding: 32px 24px;
            }
            
            .hidden-icon {
                width: 70px;
                height: 70px;
                font-size: 2.5rem;
            }
            
            .hidden-title {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景 -->
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>

    <!-- 主内容 -->
    <main class="main-content" id="mainContent" style="padding-top: 24px;">
        <div class="hidden-page">
            <div class="page-header">
                <h1 class="page-title">📚 一些隐藏小玩意</h1>
                <p class="page-subtitle">探索更多有趣内容</p>
            </div>

            <div class="hidden-grid">
                <a href="书页/纳西妲.html" class="hidden-card">
                    <div class="hidden-icon">🌿</div>
                    <div class="hidden-title">纳西妲</div>
                    <div class="hidden-desc">和纳西妲有关的小说</div>
                </a>

                <a href="书页/阳光小学.html" class="hidden-card">
                    <div class="hidden-icon">🏫</div>
                    <div class="hidden-title">阳光小学</div>
                    <div class="hidden-desc">平凡的小学里发生着不平凡的事</div>
                </a>

                <a href="书页/ybss.html" class="hidden-card">
                    <div class="hidden-icon">📷</div>
                    <div class="hidden-title">写真专区</div>
                    <div class="hidden-desc">各色写真</div>
                </a>

                <a href="书页/video.html" class="hidden-card">
                    <div class="hidden-icon">🎬</div>
                    <div class="hidden-title">视频</div>
                    <div class="hidden-desc">神秘小视频</div>
                </a>

                <a href="书页/eh.html" class="hidden-card">
                    <div class="hidden-icon">🎨</div>
                    <div class="hidden-title">e站doujinshi</div>
                    <div class="hidden-desc">同人图片</div>
                </a>
            </div>

            <a href="index.html" class="back-btn">← 返回首页</a>
        </div>
    </main>

    <script src="version.js"></script>
    <script src="common.plus.js"></script>
</body>
</html>
