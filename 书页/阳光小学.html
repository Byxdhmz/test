<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阳光小学 · 图书目录</title>
    <link rel="stylesheet" href="../common.css">
    <style>
        /* 页面专属样式 - 阳光小学暖色调 */
        :root {
            --sun-orange: #e17055;
            --sun-yellow: #ffeaa7;
        }

        [data-theme="dark"] {
            --sun-orange: #fab1a0;
            --sun-yellow: rgba(225, 112, 85, 0.2);
        }

        .main-content {
            padding: 24px 16px;
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            transition: all 0.3s;
        }

        [data-theme="dark"] .main-content {
            background: linear-gradient(135deg, #3d2817 0%, #2d1f1f 100%);
        }

        .sun-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .sun-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #d63031;
            margin-bottom: 8px;
        }

        [data-theme="dark"] .sun-title {
            color: #fab1a0;
        }

        .sun-sub {
            color: #e17055;
            font-size: 0.9rem;
        }

        [data-theme="dark"] .sun-sub {
            color: #ffeaa7;
        }

        .catalog {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .book-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        .book-card:active {
            transform: scale(0.99);
        }

        .book-card:hover {
            border-color: var(--sun-orange);
            box-shadow: var(--shadow-lg);
        }

        .book-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--sun-orange);
            margin-bottom: 12px;
        }

        .book-chapters {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .book-chapters li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .book-chapters li:last-child {
            border-bottom: none;
        }

        .book-chapters li::before {
            content: '•';
            position: absolute;
            left: 6px;
            color: var(--sun-orange);
            font-weight: bold;
        }

        .book-chapters a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .book-chapters a:hover {
            color: var(--sun-orange);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 32px auto 0;
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .back-btn:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .main-content {
                margin-top: 64px;
                min-height: calc(100vh - 64px);
                padding: 40px 24px;
            }

            .sun-title {
                font-size: 2rem;
            }

            .book-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 主内容 -->
    <main class="main-content" id="mainContent">
        <div class="sun-header">
            <h1 class="sun-title">📚 阳光小学系列图书</h1>
            <p class="sun-sub">平凡的小学里发生着不平凡的事</p>
        </div>

        <div class="catalog">
            <div class="book-card">
                <div class="book-title">《阳光小学中的怪声》</div>
                <ul class="book-chapters">
                    <li><a href="../book/book3/1.html">第0章 你的信息及新的开始</a></li>
                    <li><a href="../book/book3/2.html">第1章 色色的老师</a></li>
                    <li><a href="../book/book3/3.html">第2章 神秘的游戏</a></li>
                    <li><a href="../book/book3/4.html">第3章 舔舔舔</a></li>
                    <li><a href="../book/book3/5.html">第4章 更激烈的玩耍</a></li>
                </ul>
            </div>

            <div class="book-card">
                <div class="book-title">《阳光小学的奇怪校规》</div>
                <ul class="book-chapters">
                    <li><a href="../book/book3/6.html">第0章 你的信息及新的开始</a></li>
                    <li><a href="../book/book3/7.html">第1章 上学的路</a></li>
                    <li><a href="../book/book3/8.html">第2章 初到学校</a></li>
                    <li><a href="../book/book3/9.html">第3章 男主林小天</a></li>
                    <li><a href="../book/book3/10.html">第4章 刺激的一周</a></li>
                </ul>
            </div>
        </div>

        <a href="../book-selection-another.html" class="back-btn">← 返回隐藏功能</a>
    </main>

    <script src="../version.js"></script>
    <script src="../common.js"></script>
</body>
</html>
