<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>doujinshi</title>
    <link rel="stylesheet" href="../common.css">
    <style>
        /* 页面专属样式 - 淡黄色主题 */
        :root {
            --doujin-yellow: #e17055;
            --doujin-light: #fff9c4;
        }
        
        [data-theme="dark"] {
            --doujin-yellow: #ffeaa7;
            --doujin-light: rgba(255, 234, 167, 0.1);
        }
        
        .main-content {
        height: 1100px;
            padding: 24px 16px;
            background: linear-gradient(135deg, #fff9c4 0%, #ffeaa7 100%);
            transition: all 0.3s;
        }
        
        [data-theme="dark"] .main-content {
            background: linear-gradient(135deg, #2d2d1f 0%, #1f1f17 100%);
        }
        
        .doujin-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .doujin-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #d63031;
            margin-bottom: 8px;
        }
        
        [data-theme="dark"] .doujin-title {
            color: #fab1a0;
        }
        
        .grid {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        
        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }
        
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--doujin-yellow);
            box-shadow: var(--shadow-lg);
        }
        
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }
        
        @media (min-width: 768px) {
            .card img {
                height: 280px;
            }
        }
        
        .card footer {
            padding: 16px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 32px auto 0;
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        
        .back-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <!-- 主内容 -->
    <main class="main-content" id="mainContent">
        <div class="doujin-header">
            <h1 class="doujin-title">📚 选择阅读漫画</h1>
        </div>

        <div class="grid">
            <div class="card" onclick="location.href='../book/doujinshi/在夏天就要穿学校泳装/reader.1.html'">
                <img src="../book/doujinshi/在夏天就要穿学校泳装/1.webp" alt="泳装">
                <footer>泳装<br>共 25 页</footer>
            </div>

            <div class="card" onclick="location.href='../book/doujinshi/想被夸奖/reader.2.html'">
                <img src="../book/doujinshi/想被夸奖/1.webp" alt="想被夸奖">
                <footer>想被夸奖<br>共 74 页</footer>
            </div>
        </div>

        <a href="../book-selection-another.html" class="back-btn">← 返回隐藏功能</a>
    </main>

    <script src="../version.js"></script>
    <script src="../common.js"></script>
</body>

</html>
