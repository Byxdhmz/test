        body {

        }

        /* 头部控制栏 */
        .header {
            max-width: 1400px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        }

        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .shuffle-btn {
            background: #4CAF50;
            color: white;
        }

        .shuffle-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .reset-btn {
            background: #2196F3;
            color: white;
        }

        .reset-btn:hover {
            background: #1976D2;
        }

        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .card .thumbnail {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            overflow: hidden;
        }

        .card .thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .card:hover .thumbnail img {
            transform: scale(1.05);
        }

        /* 播放按钮 */
        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
            transition: all 0.3s;
        }

        .play-overlay::after {
            content: '▶';
            font-size: 24px;
            color: #333;
            margin-left: 5px;
        }

        .card:hover .play-overlay {
            transform: translate(-50%, -50%) scale(1.1);
            background: #ff4444;
        }

        .card:hover .play-overlay::after {
            color: white;
        }

        .card footer {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .card .meta {
            padding: 0 15px 15px;
            font-size: 14px;
            color: #666;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.95);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            position: relative;
            margin: 3% auto;
            width: 90%;
            max-width: 1000px;
        }

        .modal iframe {
            width: 100%;
            height: 550px;
            border: none;
            border-radius: 12px;
        }

        .close {
            position: absolute;
            top: -50px;
            right: 0;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close:hover {
            background: rgba(255,255,255,0.2);
            transform: rotate(90deg);
        }

        .modal-title {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 20px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .modal iframe { height: 250px; }
            .video-grid { grid-template-columns: 1fr; }
            h1 { font-size: 20px; }
        }
    </style>

        // ==================== Fisher-Yates 洗牌算法 ====================
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // ==================== 渲染视频卡片 ====================
        function renderVideos(videosToRender) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            videosToRender.forEach((video, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${index * 0.05}s`;
                card.onclick = () => openVideo(video);
                
                card.innerHTML = `
                    <div class="thumbnail">
                        <img src="${video.thumbnail}" alt="${video.title}" 
                             onerror="this.src='https://via.placeholder.com/300x170?text=Video+${video.id}'">
                        <div class="play-overlay"></div>
                    </div>
                    <footer>${video.title}</footer>`;
                
                grid.appendChild(card);
            });
        }

        // ==================== 随机排列并渲染 ====================
        function shuffleAndRender() {
            const shuffled = shuffleArray(originalVideos);
            renderVideos(shuffled);
        }

        // ==================== 恢复原始顺序 ====================
        function resetOrder() {
            renderVideos(originalVideos);
        }

        // ==================== 播放控制 ====================
        function openVideo(video) {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoFrame');
            const title = document.getElementById('modalTitle');
            
            title.textContent = video.title;
            
            let finalUrl;
            switch(video.type) {
                case 'iframe':
                    finalUrl = video.url;
                    break;
                case 'local':
                    finalUrl = `player.html?video=${encodeURIComponent(video.url)}&title=${encodeURIComponent(video.title)}`;
                    break;
                case 'video':
                    finalUrl = createVideoPage(video.url);
                    break;
                default:
                    finalUrl = video.url;
            }
            
            iframe.src = finalUrl;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoFrame');
            
            iframe.src = '';
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function createVideoPage(videoUrl) {
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>
                        * { margin: 0; padding: 0; }
                        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
                        video { width: 100%; height: 100%; max-height: 100vh; }
                    </style>
                </head>
                <body>
                    <video controls autoplay>
                        <source src="${videoUrl}" type="video/mp4">
                    </video>
                </body>
                </html>
            `;
            const blob = new Blob([html], { type: 'text/html' });
            return URL.createObjectURL(blob);
        }

        // ==================== 事件监听 ====================
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) closeVideo();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeVideo();
        });

        // ==================== 页面加载时自动随机排列 ====================
        window.onload = function() {
